<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixelForge — Pixel Art Editor</title>
  <meta name="description" content="A free, browser-based pixel art editor inspired by Aseprite. Create sprites, animations, and pixel art directly in your browser.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='1' y='1' width='6' height='6' fill='%23e94560'/><rect x='9' y='1' width='6' height='6' fill='%230f3460'/><rect x='1' y='9' width='6' height='6' fill='%230f3460'/><rect x='9' y='9' width='6' height='6' fill='%23e94560'/></svg>">
</head>
<body>

  <!-- ==================== MENU BAR ==================== -->
  <header id="menu-bar">
    <div id="app-logo">
      <svg viewBox="0 0 16 16" width="20" height="20">
        <rect x="1" y="1" width="6" height="6" fill="#e94560"/>
        <rect x="9" y="1" width="6" height="6" fill="#0f3460"/>
        <rect x="1" y="9" width="6" height="6" fill="#0f3460"/>
        <rect x="9" y="9" width="6" height="6" fill="#e94560"/>
      </svg>
      <span>PixelForge</span>
    </div>
    <nav id="menu-items">
      <div class="menu-item" data-menu="file">
        <span class="menu-label">File</span>
        <div class="menu-dropdown">
          <button data-action="new-canvas">New Canvas<kbd>Ctrl+N</kbd></button>
          <button data-action="new-from-template">New from Template…</button>
          <div class="menu-separator"></div>
          <button data-action="open-project">Open Project…<kbd>Ctrl+O</kbd></button>
          <button data-action="save-project">Save Project<kbd>Ctrl+S</kbd></button>
          <button data-action="save-project-as">Save Project As…<kbd>Ctrl+Shift+S</kbd></button>
          <div class="menu-separator"></div>
          <button data-action="import-image">Import Image…</button>
          <button data-action="export-png">Export as PNG…</button>
          <button data-action="export-spritesheet">Export Spritesheet…</button>
          <button data-action="export-gif">Export as GIF…</button>
        </div>
      </div>
      <div class="menu-item" data-menu="edit">
        <span class="menu-label">Edit</span>
        <div class="menu-dropdown">
          <button data-action="undo">Undo<kbd>Ctrl+Z</kbd></button>
          <button data-action="redo">Redo<kbd>Ctrl+Y</kbd></button>
          <div class="menu-separator"></div>
          <button data-action="cut">Cut<kbd>Ctrl+X</kbd></button>
          <button data-action="copy">Copy<kbd>Ctrl+C</kbd></button>
          <button data-action="paste">Paste<kbd>Ctrl+V</kbd></button>
          <button data-action="delete-selection">Delete<kbd>Del</kbd></button>
          <div class="menu-separator"></div>
          <button data-action="select-all">Select All<kbd>Ctrl+A</kbd></button>
          <button data-action="deselect">Deselect<kbd>Ctrl+D</kbd></button>
        </div>
      </div>
      <div class="menu-item" data-menu="view">
        <span class="menu-label">View</span>
        <div class="menu-dropdown">
          <button data-action="toggle-grid">Toggle Grid<kbd>Ctrl+'</kbd></button>
          <button data-action="grid-settings">Grid Settings…</button>
          <div class="menu-separator"></div>
          <button data-action="zoom-in">Zoom In<kbd>Ctrl+=</kbd></button>
          <button data-action="zoom-out">Zoom Out<kbd>Ctrl+-</kbd></button>
          <button data-action="zoom-fit">Fit to Screen<kbd>Ctrl+0</kbd></button>
          <button data-action="zoom-100">Actual Pixels<kbd>Ctrl+1</kbd></button>
        </div>
      </div>
      <div class="menu-item" data-menu="canvas">
        <span class="menu-label">Canvas</span>
        <div class="menu-dropdown">
          <button data-action="resize-canvas">Resize Canvas…</button>
          <button data-action="flip-h">Flip Horizontal</button>
          <button data-action="flip-v">Flip Vertical</button>
          <button data-action="rotate-cw">Rotate 90° CW</button>
          <button data-action="rotate-ccw">Rotate 90° CCW</button>
        </div>
      </div>
      <div class="menu-item" data-menu="help">
        <span class="menu-label">Help</span>
        <div class="menu-dropdown">
          <button data-action="show-shortcuts">Keyboard Shortcuts<kbd>?</kbd></button>
          <button data-action="show-about">About PixelForge</button>
        </div>
      </div>
    </nav>
  </header>

  <!-- ==================== MAIN LAYOUT ==================== -->
  <div id="main-layout">

    <!-- ========== LEFT TOOLBAR ========== -->
    <aside id="toolbar">
      <div id="tool-buttons">
        <button class="tool-btn active" data-tool="pencil" title="Pencil (B)">
          <svg viewBox="0 0 24 24"><path d="M3 21l1.65-3.8 2.15 2.15L3 21zm4.39-3.29l-2.09-2.09L16.59 4.33l2.09 2.09L7.39 17.71zM19.39 7.03l-2.09-2.09 1.29-1.29a1 1 0 011.41 0l.68.68a1 1 0 010 1.41l-1.29 1.29z"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
          <svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.53a4 4 0 01-5.66 0L3.52 17.7a2 2 0 010-2.83l8.73-8.73 3.99-2.58zm-1.41 1.42L6.44 13.37l4.24 4.24 8.39-8.39-4.24-4.24zM3 21h18v1H3v-1z"/></svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line (L)">
          <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="Rectangle (U)">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="ellipse" title="Ellipse (O)">
          <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="fill" title="Fill Bucket (G)">
          <svg viewBox="0 0 24 24"><path d="M16.56 8.94L8.32.7a1 1 0 00-1.42 0L5.17 2.44a1 1 0 000 1.41l1.94 1.94-4.88 4.88a2 2 0 000 2.83l5.66 5.66a2 2 0 002.83 0l5.84-5.84a2 2 0 000-2.83l-.44-.44zM10 18.23L4.34 12.57l4.95-4.95 5.66 5.66L10 18.23z"/><path d="M19 14c-1.5 2-3 3.5-3 5a3 3 0 006 0c0-1.5-1.5-3-3-5z"/></svg>
        </button>
        <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
          <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.42 1.41-7.07 7.07a2 2 0 000 2.83l2.83 2.83a2 2 0 002.83 0l7.07-7.07 1.41 1.41 1.42-1.41-1.42-1.42 3.12-3.12a1 1 0 00.08-1.31z"/></svg>
        </button>
        <button class="tool-btn" data-tool="selection" title="Selection (M)">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="4 2"/></svg>
        </button>
        <button class="tool-btn" data-tool="move" title="Move (V)">
          <svg viewBox="0 0 24 24"><path d="M12 2l3 3h-2v4h4v-2l3 3-3 3v-2h-4v4h2l-3 3-3-3h2v-4H7v2l-3-3 3-3v2h4V5H9l3-3z"/></svg>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Brush Size -->
      <div id="brush-size-control" class="tool-control">
        <label title="Brush Size">
          <svg viewBox="0 0 16 16" width="14" height="14"><circle cx="8" cy="8" r="6" fill="currentColor"/></svg>
        </label>
        <input type="range" id="brush-size-slider" min="1" max="8" value="1" step="1">
        <span id="brush-size-value" class="tool-value">1</span>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Shape Fill Toggle -->
      <div id="shape-fill-control" class="tool-control" style="display:none">
        <button id="filled-toggle" class="toggle-btn" title="Filled Shape">
          <svg viewBox="0 0 16 16" width="14" height="14"><rect x="2" y="2" width="12" height="12" rx="1" fill="currentColor"/></svg>
          <span>Fill</span>
        </button>
      </div>

      <!-- Symmetry -->
      <div id="symmetry-controls" class="tool-control">
        <button id="symmetry-h-btn" class="toggle-btn" title="Horizontal Symmetry">
          <svg viewBox="0 0 16 16" width="14" height="14"><line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 1"/><polygon points="3,5 6,8 3,11" fill="currentColor"/><polygon points="13,5 10,8 13,11" fill="currentColor"/></svg>
        </button>
        <button id="symmetry-v-btn" class="toggle-btn" title="Vertical Symmetry">
          <svg viewBox="0 0 16 16" width="14" height="14"><line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 1"/><polygon points="5,3 8,6 11,3" fill="currentColor"/><polygon points="5,13 8,10 11,13" fill="currentColor"/></svg>
        </button>
      </div>

      <!-- Foreground / Background Colors -->
      <div id="color-swatches">
        <div id="bg-color" title="Background Color" style="background:#ffffff"></div>
        <div id="fg-color" title="Foreground Color" style="background:#000000"></div>
        <button id="swap-colors-btn" title="Swap Colors (X)">
          <svg viewBox="0 0 16 16" width="12" height="12"><path d="M4 2l-3 3 3 3M12 8l3 3-3 3" stroke="currentColor" stroke-width="1.5" fill="none"/><line x1="1" y1="5" x2="14" y2="5" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </aside>

    <!-- ========== CANVAS VIEWPORT ========== -->
    <div id="canvas-viewport">
      <div id="canvas-wrapper">
        <canvas id="display-canvas"></canvas>
      </div>
    </div>

    <!-- ========== RIGHT SIDEBAR ========== -->
    <aside id="right-sidebar">

      <!-- Color Picker Panel -->
      <section id="color-picker-panel" class="panel">
        <div class="panel-header" data-panel="color-picker">
          <span class="panel-title">Color</span>
          <button class="panel-collapse-btn" title="Collapse">
            <svg viewBox="0 0 16 16" width="12" height="12"><polyline points="4,6 8,10 12,6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
        </div>
        <div class="panel-body">
          <!-- SL Color Field -->
          <div id="color-field-wrapper">
            <canvas id="color-field" width="200" height="150"></canvas>
            <div id="color-field-cursor"></div>
          </div>
          <!-- Hue Bar -->
          <div id="hue-bar-wrapper" class="color-bar-wrapper">
            <canvas id="hue-bar" width="200" height="16"></canvas>
            <div id="hue-bar-cursor" class="bar-cursor"></div>
          </div>
          <!-- Alpha Bar -->
          <div id="alpha-bar-wrapper" class="color-bar-wrapper">
            <canvas id="alpha-bar" width="200" height="16"></canvas>
            <div id="alpha-bar-cursor" class="bar-cursor"></div>
          </div>
          <!-- Color Inputs -->
          <div id="color-inputs">
            <div class="color-input-row">
              <label>H</label><input type="number" id="h-input" min="0" max="360" value="0">
              <label>S</label><input type="number" id="s-input" min="0" max="100" value="0">
              <label>L</label><input type="number" id="l-input" min="0" max="100" value="0">
            </div>
            <div class="color-input-row">
              <label>R</label><input type="number" id="r-input" min="0" max="255" value="0">
              <label>G</label><input type="number" id="g-input" min="0" max="255" value="0">
              <label>B</label><input type="number" id="b-input" min="0" max="255" value="0">
            </div>
            <div class="color-input-row hex-row">
              <label>#</label><input type="text" id="hex-input" value="000000" maxlength="8" spellcheck="false">
              <label>A</label><input type="number" id="a-input" min="0" max="255" value="255">
            </div>
          </div>
        </div>
      </section>

      <!-- Palette Panel -->
      <section id="palette-panel" class="panel">
        <div class="panel-header" data-panel="palette">
          <span class="panel-title">Palette</span>
          <button class="panel-collapse-btn" title="Collapse">
            <svg viewBox="0 0 16 16" width="12" height="12"><polyline points="4,6 8,10 12,6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
        </div>
        <div class="panel-body">
          <div id="palette-toolbar">
            <select id="palette-select" title="Preset Palette">
              <option value="custom">Custom</option>
              <option value="pico8">PICO-8</option>
              <option value="endesga32">Endesga 32</option>
              <option value="gameboy">Game Boy</option>
              <option value="sweetie16">Sweetie 16</option>
              <option value="aap64">AAP-64</option>
            </select>
            <button id="add-color-btn" title="Add Current Color">
              <svg viewBox="0 0 16 16" width="14" height="14"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
          <div id="palette-grid"></div>
        </div>
      </section>

      <!-- Layers Panel -->
      <section id="layers-panel" class="panel">
        <div class="panel-header" data-panel="layers">
          <span class="panel-title">Layers</span>
          <button class="panel-collapse-btn" title="Collapse">
            <svg viewBox="0 0 16 16" width="12" height="12"><polyline points="4,6 8,10 12,6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
        </div>
        <div class="panel-body">
          <div id="layer-settings">
            <select id="layer-blend-mode" title="Blend Mode">
              <option value="source-over">Normal</option>
              <option value="multiply">Multiply</option>
              <option value="screen">Screen</option>
              <option value="overlay">Overlay</option>
              <option value="darken">Darken</option>
              <option value="lighten">Lighten</option>
            </select>
            <div id="layer-opacity-control">
              <label>Opacity</label>
              <input type="range" id="layer-opacity-slider" min="0" max="100" value="100">
              <span id="layer-opacity-value">100%</span>
            </div>
          </div>
          <div id="layers-list"></div>
          <div id="layer-actions">
            <button id="add-layer-btn" title="Add Layer">
              <svg viewBox="0 0 16 16" width="14" height="14"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button id="delete-layer-btn" title="Delete Layer">
              <svg viewBox="0 0 16 16" width="14" height="14"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="2"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button id="duplicate-layer-btn" title="Duplicate Layer">
              <svg viewBox="0 0 16 16" width="14" height="14"><rect x="2" y="4" width="8" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="6" y="2" width="8" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <button id="merge-layer-btn" title="Merge Down">
              <svg viewBox="0 0 16 16" width="14" height="14"><polyline points="4,4 8,9 12,4" stroke="currentColor" stroke-width="2" fill="none"/><line x1="4" y1="12" x2="12" y2="12" stroke="currentColor" stroke-width="2"/></svg>
            </button>
            <button id="move-layer-up-btn" title="Move Layer Up">
              <svg viewBox="0 0 16 16" width="14" height="14"><polyline points="4,10 8,5 12,10" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            </button>
            <button id="move-layer-down-btn" title="Move Layer Down">
              <svg viewBox="0 0 16 16" width="14" height="14"><polyline points="4,6 8,11 12,6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- History Panel -->
      <section id="history-panel" class="panel">
        <div class="panel-header" data-panel="history">
          <span class="panel-title">History</span>
          <button class="panel-collapse-btn" title="Collapse">
            <svg viewBox="0 0 16 16" width="12" height="12"><polyline points="4,6 8,10 12,6" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </button>
        </div>
        <div class="panel-body">
          <div id="history-list"></div>
        </div>
      </section>

    </aside>
  </div>

  <!-- ==================== TIMELINE ==================== -->
  <div id="timeline-panel">
    <div id="timeline-toolbar">
      <button id="add-frame-btn" title="Add Frame (Alt+N)">
        <svg viewBox="0 0 16 16" width="14" height="14"><line x1="8" y1="3" x2="8" y2="13" stroke="currentColor" stroke-width="2"/><line x1="3" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <button id="duplicate-frame-btn" title="Duplicate Frame">
        <svg viewBox="0 0 16 16" width="14" height="14"><rect x="2" y="4" width="8" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="6" y="2" width="8" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="delete-frame-btn" title="Delete Frame">
        <svg viewBox="0 0 16 16" width="14" height="14"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="2"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="2"/></svg>
      </button>
      <div class="timeline-separator"></div>
      <button id="prev-frame-btn" title="Previous Frame (,)">
        <svg viewBox="0 0 16 16" width="14" height="14"><polyline points="10,3 5,8 10,13" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <button id="play-btn" title="Play/Pause (Enter)">
        <svg viewBox="0 0 16 16" width="14" height="14" id="play-icon"><polygon points="5,3 13,8 5,13" fill="currentColor"/></svg>
      </button>
      <button id="next-frame-btn" title="Next Frame (.)">
        <svg viewBox="0 0 16 16" width="14" height="14"><polyline points="6,3 11,8 6,13" stroke="currentColor" stroke-width="2" fill="none"/></svg>
      </button>
      <div class="timeline-separator"></div>
      <button id="onion-skin-btn" class="toggle-btn" title="Onion Skinning">
        <svg viewBox="0 0 16 16" width="14" height="14"><ellipse cx="6" cy="8" rx="5" ry="6" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/><ellipse cx="10" cy="8" rx="5" ry="6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Onion</span>
      </button>
      <div class="timeline-separator"></div>
      <div id="fps-control">
        <label>FPS</label>
        <input type="range" id="fps-slider" min="1" max="60" value="12">
        <span id="fps-value">12</span>
      </div>
      <div id="frame-info">
        <span id="frame-count">Frame 1/1</span>
      </div>
    </div>
    <div id="frames-strip"></div>
  </div>

  <!-- ==================== STATUS BAR ==================== -->
  <footer id="status-bar">
    <span id="status-canvas-size">32×32</span>
    <span class="status-sep">|</span>
    <span id="status-cursor-pos">0, 0</span>
    <span class="status-sep">|</span>
    <span id="status-zoom">Zoom: 10x</span>
    <span class="status-sep">|</span>
    <span id="status-tool">Pencil</span>
    <span id="status-autosave" class="status-right" title="Auto-save status">
      <svg viewBox="0 0 16 16" width="12" height="12"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5A5.5 5.5 0 1113.5 8 5.51 5.51 0 018 13.5zM8.5 4H7v5l4.28 2.54.75-1.23-3.53-2.1V4z" fill="currentColor"/></svg>
      <span id="autosave-text">Saved</span>
    </span>
  </footer>

  <!-- ==================== MODALS ==================== -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-container">
      <div id="modal-header">
        <h2 id="modal-title"></h2>
        <button id="modal-close-btn" title="Close">
          <svg viewBox="0 0 16 16" width="14" height="14"><line x1="4" y1="4" x2="12" y2="12" stroke="currentColor" stroke-width="2"/><line x1="12" y1="4" x2="4" y2="12" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer"></div>
    </div>
  </div>

  <!-- ==================== CONTEXT MENU ==================== -->
  <div id="context-menu" class="hidden"></div>

  <!-- ==================== TOAST NOTIFICATIONS ==================== -->
  <div id="toast-container"></div>

  <!-- ==================== HIDDEN FILE INPUTS ==================== -->
  <input type="file" id="file-input-project" accept=".pixelforge,.json" style="display:none">
  <input type="file" id="file-input-image" accept="image/*" style="display:none">

  <script src="script.js"></script>
</body>
</html>
